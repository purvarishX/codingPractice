<!DOCTYPE html>
<html>

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body onscroll="onPageScroll()" onresize="resizeLog()">


    <div class="row">
        <div class="col-3">
            <button class="btn btn-warning" onclick="readTextValue()">Show</button>
        </div>

        <div class="col-3 bg-danger">
            <h1 onclick="readTextValue()">Click me</h1>
            <h1>Click here</h1>
        </div>

        <!--NOTE : In React, onchange will work on input tag but in JS & Angular, it will not work -->
        <div class=" col-3">
            <input class="form-control" type="text" placeholder="Enter Name" oninput="changeText()">
        </div>

        <div class="col-3">
            <select onchange="onCityChange()">
                <option>Pune</option>
                <option>Mumbai</option>
                <option>Bangalore</option>
                <option>Chennai</option>
            </select>
        </div>
    </div>

    <div class="row">
        <div class="col-4">
            <button onclick="clickButton(event,'Java')">Java</button>
            <button onclick="clickButton(event,'React')">React</button>
            <button onclick="clickButton(event,'Python')">Python</button>
        </div>
    </div>

    <br>
    <div class="row">
        <div class="col-4 bg-success p-4" onmouseenter="onMouseEnterDiv()" onmouseleave="onMouseLeaveDiv()">
            Mouse Div
        </div>
    </div>

    <br>
    <div class="row">
        <div class="col-4">
            <input onkeydown="onKeyDown()">
        </div>
    </div>

    <br>
    <div style="height:400px" class="bg-danger">
        Scroll div
    </div>

    <script src="events.js"></script>

</body>

</html>
