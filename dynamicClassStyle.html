<!DOCTYPE html>
<html>

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <script>
        // Dynamic Css

        function addColor() {
            var color = document.getElementById('txtColor').value;
            document.getElementById('myDiv').style.backgroundColor = color;
            document.getElementById('myDiv').style.border = '2px solid red';
        }


        function showHide(action) {
            document.getElementById('div2').style.display = action;
        }

        var showHideVar = false;

        function showHideToggle() {
            showHideVar = !showHideVar;
            document.getElementById('div2').style.display = showHideVar ? 'block' : 'none';
        }

        function changeWidth(event) {
            console.log("Width: ", event.target.value)
            document.getElementById('div3').style.width = event.target.value;
        }

        function changeHeight(event) {
            console.log("Width: ", event.target.value)
            document.getElementById('div3').style.height = event.target.value;
        }

        addCss = function () {
            var div4 = document.getElementById('div4');
            div4.style.width = getElementByIdValue('inputWd');
            div4.style.height = getElementByIdValue('inputHt');
            document.getElementById('div4').style.backgroundColor = document.getElementById('inputColor').value;
        }

        function getElementByIdValue(elementId) {
            return document.getElementById(elementId).value;
        }

        // Dynamic Class
        addClass = function () {
            var className = document.getElementById('txtClass').value;
            document.getElementById('myDiv').classList.add(className);
        }
    </script>

    <div>
        <div class="row">
            <div class="p-4 col-4" id="myDiv">MY DIV</div>
            <div class="col-6">
                <input type="color" id="txtColor">
                <button class="btn btn-success" onclick="addColor()">Add color</button>
                <input type="type" id="txtClass">
                <button class="btn btn-success" onclick="addClass()">Add Class</button>
            </div>
        </div>
        <br>
        <div class="row">
            <div class="col-3 p-3 bg-success" id="div2">
                Div 2
            </div>
            <div class="col-3">
                <!-- Way 1 -->
                <button class="bg-warning" onclick="showHide('block')">Show</button>
                <button class="bg-warning" onclick="showHide('none')">Hide</button>

                <!-- Way 2 -->
                <button class="bg-warning" onclick="showHideToggle('block')">Show/Hide Toggle</button>
            </div>
            <br>

            <div class="row">
                <div class="col-3 p-4 bg-warning" id="div3">
                    Div 3
                </div>
                <div class="col-3">
                    <input type="text" placeholder="width" oninput="changeWidth(event)">
                    <input type="text" placeholder="height" oninput="changeHeight(event)">
                </div>
            </div>
            <br>

            <div class="row">
                <!-- <div class="col-3 p-4 bg-success" id="div3"> --> <!-- class has more priority than id -->
                <div class="col-3 p-4" id="div4">
                    Div 4
                </div>
                <div class="col-3">
                    <input id="inputWd" type="text" placeholder="enter width">
                    <input id="inputHt" type="text" placeholder="enter height">
                    <input id="inputColor" type="color">
                    <button class="btn btn-success" onclick="addCss()">Add CSS</button>
                </div>
            </div>
        </div>
    </div>

    <script src="dynamicClassStyle.js"></script>

</body>

</html>
